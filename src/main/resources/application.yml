spring.application.name: api_invocations

spring:
  data:
    mongodb:
      uuid-representation: standard
      database: api_invocationsdb
      port: 27017
  
app:
  auth:
    enabled: false
  
  # Numeric constraints for game entities
  constraints:
    stats:
      min-value: 1
      max-value: 999999999
    skills:
      min-damage: 1
      max-damage: 999999999
      min-cooldown: 1
      max-cooldown: 999999999
      min-lvl-max: 1
      max-lvl-max: 9999
    ratio:
      min-percent: 0.0
      max-percent: 100.0

# Configuration des APIs externes
external:
  api:
    monsters-base-url: http://api_monsters:8080
    player-base-url: http://api_joueur:8080
    auth-base-url: http://api_auth:8080
    connection-timeout: 5000
    read-timeout: 5000

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
