spring.application.name: api_invocations

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/api_invocationsdb
    username: api_invocations
    password: api_invocations
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  
app:
  auth:
    enabled: false
  
  # Numeric constraints for game entities
  constraints:
    stats:
      min-value: 1
      max-value: 999999999
    skills:
      min-damage: 0
      max-damage: 999999999
      min-cooldown: 0
      max-cooldown: 999999999
      min-lvl-max: 1
      max-lvl-max: 9999
    ratio:
      min-percent: 0.0
      max-percent: 100.0

# Configuration des APIs externes
external:
  api:
    monsters-base-url: http://api_monsters:8080
    player-base-url: http://api_joueur:8080
    auth-base-url: http://api_auth:8080
    connection-timeout: 5000
    read-timeout: 5000

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
